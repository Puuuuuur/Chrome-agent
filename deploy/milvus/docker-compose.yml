services:
  etcd:
    container_name: browseragent-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - ./volumes/etcd:/etcd
  minio:
    container_name: browseragent-milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command:
      - minio
      - server
      - /minio_data
      - --console-address
      - ":9001"
    volumes:
      - ./volumes/minio:/minio_data
    ports:
      - "127.0.0.1:19001:9001"
  standalone:
    container_name: browseragent-milvus-standalone
    image: milvusdb/milvus:v2.5.26
    restart: unless-stopped
    command:
      - milvus
      - run
      - standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:19091:9091"
